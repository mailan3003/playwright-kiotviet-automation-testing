name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        KIOTVIET_API_BASE_URL: ${{ secrets.KIOTVIET_API_BASE_URL }}
        KIOTVIET_API_USERNAME: ${{ secrets.KIOTVIET_API_USERNAME }}
        KIOTVIET_API_PASSWORD: ${{ secrets.KIOTVIET_API_PASSWORD }}
        KIOTVIET_BASE_URL: ${{ secrets.KIOTVIET_BASE_URL }}
        KIOTVIET_BRANCH_ID: ${{ secrets.KIOTVIET_BRANCH_ID }}
        KIOTVIET_GROUP_ID: ${{ secrets.KIOTVIET_GROUP_ID }}
        KIOTVIET_PRONTEND_URL: ${{ secrets.KIOTVIET_PRONTEND_URL }}
        KIOTVIET_RETAILER: ${{ secrets.KIOTVIET_RETAILER }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30